server {
    listen 80;
    server_name glasgowroofmasters.co.uk www.glasgowroofmasters.co.uk;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Static files with aggressive caching
    location /static/ {
        alias /var/www/glasgow-roofmasters/app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon and robots
    location = /favicon.ico {
        alias /var/www/glasgow-roofmasters/app/static/images/favicon.svg;
        expires 1y;
        access_log off;
    }

    location = /robots.txt {
        alias /var/www/glasgow-roofmasters/app/static/robots.txt;
        access_log off;
    }

    # Proxy to Gunicorn
    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/glasgow-roofmasters/app.sock;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Rate limiting (requires nginx-module-limit-req)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # location /api/ {
    #     limit_req zone=api burst=20 nodelay;
    #     proxy_pass http://unix:/var/www/glasgow-roofmasters/app.sock;
    # }
}

